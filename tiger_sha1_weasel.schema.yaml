---
schema:
  schema_id: tiger_sha1_weasel
  name: tiger_sha1_weasel
  author: Sha1rholder (sha1rholder@outlook.com)
  dependencies:
    - tiger_sha1_py
  description: 基于虎码改良的中英混输简体字方案

ascii_composer:
  switch_key:
    Caps_Lock: noop
    Control_L: noop
    Control_R: noop
    Eisu_toggle: noop
    Shift_L: commit_code
    Shift_R: commit_code

switches:
  - name: full_shape
    reset: 0
    states:
      - 半角
      - 全角
  - name: input_record_enabled
    reset: 1
    states:
      - 输入记录关
      - 输入记录开

engine:
  processors:
    - ascii_composer
    - lua_processor@*input_record
    - lua_processor@*clear_buffer_on_ctrl
    - lua_processor@*commit_raw_before_symbol
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - matcher
    - abc_segmentor
    - punct_segmentor
  translators:
    - punct_translator
    - reverse_lookup_translator
    - table_translator
    - lua_translator@*en_weight_translate
  filters:
    - lua_filter@*hide_en_comment
    - uniquifier

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA

translator:
  enable_sentence: false
  enable_user_dict: false
  dictionary: tiger_sha1_weasel
  comment_format:
    - xform/~//

en_weight_translate:
  enable_perf_log: false
  append_space_to_candidates: false

input_record:
  log_dir: input_records
  flush_size: 100
  flush_interval_sec: 30
  sync_interval_sec: 120
  record_idle_edit_keys: false

reverse_lookup:
  dictionary: tiger_sha1_py
  prefix: "|"
  tips: （拼音）
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ue/$1üe/
    - xform/([jqxy])v/$1u/
  comment_format:
    - xform/^//

key_binder:
  bindings:
    - when: has_menu
      accept: minus
      send: Page_Up
    - when: has_menu
      accept: equal
      send: Page_Down
    - when: has_menu
      accept: Right
      send: Down
    - when: has_menu
      accept: Left
      send: Up

menu:
  page_size: 9

recognizer:
  import_preset: default
  patterns:
    uppercase: "a^"
    reverse_lookup: ^\|[a-z]*'?$

punctuator:
  import_preset: symbols
